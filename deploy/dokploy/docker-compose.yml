services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tolong}
      POSTGRES_USER: ${POSTGRES_USER:-tolong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tolong} -d ${POSTGRES_DB:-tolong}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tolong:change-this-postgres-password@postgres:5432/tolong?schema=public}
      PORT: 3001
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://dokploy.closeclaw.site/tolong-api/v1}
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:-change-this-internal-api-token}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_BASE_URL: ${API_BASE_URL:-http://api:3001/v1}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://dokploy.closeclaw.site/tolong-api/v1}
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:-change-this-internal-api-token}
      ADMIN_ACTOR_NAME: ${ADMIN_ACTOR_NAME:-Admin Dashboard}
      ADMIN_ACCESS_CODE: ${ADMIN_ACCESS_CODE:-change-this-admin-login-code}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-this-admin-session-secret}
    ports:
      - "3002:3000"
    depends_on:
      api:
        condition: service_healthy

  postgres-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
      POSTGRES_DB: ${POSTGRES_DB:-tolong}
      POSTGRES_USER: ${POSTGRES_USER:-tolong}
    volumes:
      - backups_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'while true; do
      pg_dump -h postgres -U "$$POSTGRES_USER" "$$POSTGRES_DB" | gzip > "/backups/tolong-$$(date +%Y%m%d-%H%M%S).sql.gz";
      find /backups -name "tolong-*.sql.gz" -mtime +14 -delete;
      sleep 86400;
      done'

volumes:
  postgres_data:
  uploads_data:
  backups_data:
