name: tolong_mobile
description: TOLONG mobile app for DPD PSI Mesuji Lampung.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.8.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.14.0
  firebase_auth: ^5.6.0
  firebase_messaging: ^15.2.7
  google_sign_in: ^6.3.0
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.1
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  image_picker: ^1.1.2
  file_picker: ^10.2.0
  qr_flutter: ^4.1.0
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.1
  video_player: ^2.11.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/logo/
